<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Progress app icon</title>
  <desc>Progress app icon with navy background, bar chart, straight gold trend arrow, and wordmark</desc>

  <defs>
    <clipPath id="sq-clip">
      <rect x="0" y="0" width="300" height="300" rx="68" ry="68"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="300" height="300" rx="68" ry="68" fill="#131A2B"/>
  <rect x="0" y="0" width="300" height="300" rx="68" ry="68" fill="none" stroke="#2A334A" stroke-width="2"/>

  <text x="150" y="62" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="20" font-weight="700" fill="#F8F5EC" letter-spacing="5">PROGRESS</text>
  <rect x="53" y="69" width="194" height="2" rx="1" fill="#F59E0B" opacity="0.8"/>

  <rect x="34" y="215" width="44" height="45" rx="6" fill="#34D399" opacity="0.7"/>
  <rect x="88" y="190" width="44" height="70" rx="6" fill="#34D399" opacity="0.85"/>
  <rect x="142" y="158" width="44" height="102" rx="6" fill="#F59E0B"/>
  <rect x="196" y="122" width="44" height="138" rx="6" fill="#FBBF24"/>

  <!-- Single straight line from above bar 1 to above bar 4 -->
  <line x1="56" y1="193" x2="218" y2="98" stroke="#F59E0B" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polyline points="200,91 218,98 211,115" fill="none" stroke="#F59E0B" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

</svg>
